const Button = ({ children, variant = 'primary', size = 'md', icon: Icon, className = '', onClick, type = 'button', disabled = false }) => {
  const baseStyle = "inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed";
  const variants = {
    primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-sm",
    secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200 focus:ring-slate-500",
    outline: "border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 focus:ring-slate-500",
    danger: "bg-rose-600 text-white hover:bg-rose-700 focus:ring-rose-500",
    ghost: "text-slate-600 hover:bg-slate-100 hover:text-slate-900"
  };
  const sizes = {
    sm: "px-3 py-1.5 text-xs",
    md: "px-4 py-2 text-sm",
    lg: "px-6 py-3 text-base"
  };
  return (
    <button type={type} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className}`} onClick={onClick}>
      {Icon && <Icon className={`w-4 h-4 ${children ? 'mr-2' : ''}`} />}
      {children}
    </button>
  );
};

const getElapsedHours = (start, end) => {
  if (!start || !end) return 0;
  const parseTime = (timeStr) => {
    // Basic parser for HH:MM 24h format
    const parts = timeStr.match(/(\d+):(\d+)\s*(AM|PM)?/i);
    if (!parts) return 0;
    let hours = parseInt(parts[1], 10);
    const minutes = parseInt(parts[2], 10);
    const ampm = parts[3] ? parts[3].toUpperCase() : null;
    
    if (ampm === 'PM' && hours < 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;
    
    return hours + minutes / 60;
  };
  
  // If parsing simple 24h time strings from inputs
  const startHrs = parseTime(start);
  const endHrs = parseTime(end);
  let duration = endHrs - startHrs;
  if (duration < 0) duration += 24; // Handle overnight shifts
  return duration.toFixed(1);
};

const getMonthsDiff = (startDateStr, endDateStr) => {
  if (!startDateStr) return 0;
  const start = new Date(startDateStr);
  const end = new Date(endDateStr);
  return end.getMonth() - start.getMonth() + (12 * (end.getFullYear() - start.getFullYear()));
};

  // Billing Manual Edit / Admin Auth States
  const [showAdminPinModal, setShowAdminPinModal] = useState(false);
  const [adminPinInput, setAdminPinInput] = useState('');
  const [pendingBillingAction, setPendingBillingAction] = useState(null); // 'payment' | 'balance'
  const [showPaymentModal, setShowPaymentModal] = useState(false);
  const [showBalanceModal, setShowBalanceModal] = useState(false);
  const [showAddCardModal, setShowAddCardModal] = useState(false);
  const [pinError, setPinError] = useState(false);
  
  const [newPaymentForm, setNewPaymentForm] = useState({ amount: 50, description: 'Uniform / Gear Sale', method: 'Credit Card' });
  const [newBalanceAmount, setNewBalanceAmount] = useState('');
  const [newCardForm, setNewCardForm] = useState({ name: 'Visa', expiry: '12/29' });

  // Rank / Attendance States
  const [showRankOverrideModal, setShowRankOverrideModal] = useState(false);
  const [promoTargetRank, setPromoTargetRank] = useState(null);
  const [promoErrorMsg, setPromoErrorMsg] = useState('');
  const [overridePin, setOverridePin] = useState('');
  const [overridePinError, setOverridePinError] = useState('');
  const [attendanceView, setAttendanceView] = useState('lifetime');
  const [showManualSignIn, setShowManualSignIn] = useState(false);
  const [signInForm, setSignInForm] = useState({ date: new Date().toISOString().split('T')[0], classId: '' });

  const member = members.find(m => m.id === selectedId) || members[0];

  const handleAddStripe = () => {
    const updated = members.map(m => {
      if (m.id === member.id) {
        const newStripes = Math.min(4, m.rank.stripes + 1);
        return { ...m, rank: { ...m.rank, stripes: newStripes } };
      }
      return m;
    });
    setMembers(updated);
  };

  const getClassesForDate = (dateString) => {
    if (!dateString) return [];
    const date = new Date(dateString);
    const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'long' });
    return classes.filter(c => c.day === dayOfWeek);
  };

  const handleManualSignIn = (e) => {
    e.preventDefault();
    const cls = classes.find(c => c.id === signInForm.classId);
    if (!cls) return;

    const newHistory = {
      id: `h-${Date.now()}`,
      date: signInForm.date,
      className: cls.title
    };

    const updated = members.map(m => {
      if (m.id === member.id) {
        return {
          ...m,
          rank: { ...m.rank, classesSincePromotion: m.rank.classesSincePromotion + 1 },
          attendance: {
            ...m.attendance,
            total: m.attendance.total + 1,
            thisMonth: m.attendance.thisMonth + 1,
            lastAttended: signInForm.date,
            history: [newHistory, ...(m.attendance.history || [])]
          }
        };
      }
      return m;
    });
    setMembers(updated);
    setShowManualSignIn(false);
    setSignInForm({ date: new Date().toISOString().split('T')[0], classId: '' });
  };

  const executePromotion = (targetRank) => {
    const todayStr = new Date().toISOString().split('T')[0];
    const promoDate = new Date();
    promoDate.setMonth(promoDate.getMonth() + (targetRank.timeframeMonths || 6));
    const nextEligibleStr = promoDate.toISOString().split('T')[0];

    const updated = members.map(m => {
      if (m.id === member.id) {
        return {
          ...m,
          rank: {
            ...m.rank,
            belt: targetRank.name,
            color: targetRank.color,
            stripes: 0,
            lastPromoted: todayStr,
            nextEligibleDate: nextEligibleStr,
            timeframeMonths: targetRank.timeframeMonths || 6,
            classesSincePromotion: 0,
            requiredClasses: targetRank.requiredClasses
          }
        };
      }
      return m;
    });
    setMembers(updated);
    setRankDropdownOpen(false);
    setShowRankOverrideModal(false);
    setOverridePin('');
    setOverridePinError('');
  };

  const handleSelectBeltRank = (targetRank) => {
    const classesMet = member.rank.classesSincePromotion >= targetRank.requiredClasses;
    const monthsElapsed = getMonthsDiff(member.rank.lastPromoted, new Date().toISOString());
    const timeMet = monthsElapsed >= (targetRank.timeframeMonths || 0);

    if (!classesMet || !timeMet) {
      setPromoTargetRank(targetRank);
      let error = `Criteria not met for ${targetRank.name}.`;
      if (!classesMet) error += ` Needs ${targetRank.requiredClasses - member.rank.classesSincePromotion} more classes.`;
      if (!timeMet) error += ` Minimum timeframe of ${targetRank.timeframeMonths} months has not passed.`;
      setPromoErrorMsg(error);
      setShowRankOverrideModal(true);
      return;
    }
    executePromotion(targetRank);
  };

  const attemptOverride = () => {
    const staff = staffList.find(s => s.pin === overridePin);
    if (!staff) {
      setOverridePinError("Invalid PIN.");
      return;
    }
    if (['Instructor', 'Lead instructor', 'Owner', 'Head Coach'].includes(staff.role)) {
      executePromotion(promoTargetRank);
    } else {
      setOverridePinError("Permission Denied: Assistant coaches cannot override rank requirements.");
    }
  };

  const handleBillingActionRequest = (actionType) => {
    setPendingBillingAction(actionType);
    setAdminPinInput('');
    setPinError(false);
    setShowAdminPinModal(true);
  };

  const handleVerifyAdminPin = () => {
    if (adminPinInput === '1234' || staffList.some(s => s.pin === adminPinInput && ['Owner', 'Head Coach'].includes(s.role))) {
      setShowAdminPinModal(false);
      setPinError(false);
      if (pendingBillingAction === 'payment') setShowPaymentModal(true);
      if (pendingBillingAction === 'balance') setShowBalanceModal(true);
    } else {
      setPinError(true);
      setAdminPinInput('');
    }
  };

  const handleManualPaymentSubmit = (e) => {
    e.preventDefault();
    const updated = members.map(m => {
      if (m.id === member.id) {
        const newBalance = Math.max(0, m.balance - Number(newPaymentForm.amount));
        return { ...m, balance: newBalance };
      }
      return m;
    });
    setMembers(updated);
    setShowPaymentModal(false);
  };

  const handleBalanceUpdateSubmit = (e) => {
    e.preventDefault();
    const updated = members.map(m => {
      if (m.id === member.id) {
        return { ...m, balance: Number(newBalanceAmount) };
      }
      return m;
    });
    setMembers(updated);
    setShowBalanceModal(false);
    setNewBalanceAmount('');
  };

  const handleAddCardSubmit = (e) => {
    e.preventDefault();
    const updated = members.map(m => {
      if (m.id === member.id) {
        const currentMethods = m.paymentMethods || [];
        const newMethod = { id: `pm-${Date.now()}`, name: newCardForm.name, expiry: newCardForm.expiry, type: 'Credit Card' };
        return { ...m, paymentMethods: [...currentMethods, newMethod] };
      }
      return m;
    });
    setMembers(updated);
    setShowAddCardModal(false);
    setNewCardForm({ name: 'Visa', expiry: '12/29' });
  };

  const handleRemoveCard = (cardId) => {
    const updated = members.map(m => {
      if (m.id === member.id) {
        const currentMethods = m.paymentMethods || [];
        return { ...m, paymentMethods: currentMethods.filter(pm => pm.id !== cardId) };
      }
      return m;
    });
    setMembers(updated);
  };

  const attendanceChartData = useMemo(() => {
    let history = member?.attendance?.history || [];
    if (history.length === 0) return [];

    // Filter data based on the selected timeframe view
    if (attendanceView === 'rank') {
      const lastPromoted = member?.rank?.lastPromoted || '1970-01-01';
      history = history.filter(h => h.date >= lastPromoted);
    } else if (attendanceView === 'month') {
      const currentMonthPrefix = new Date().toISOString().substring(0, 7);
      history = history.filter(h => h.date.startsWith(currentMonthPrefix));
    }

    if (history.length === 0) return [];

    // Aggregate based on the view type (daily for month view, monthly for others)
    const rawCounts = {};
    history.forEach(h => {
      const key = attendanceView === 'month' ? h.date : h.date.substring(0, 7);
      rawCounts[key] = (rawCounts[key] || 0) + 1;
    });
    
    // Format output for Recharts
    return Object.keys(rawCounts).sort().map(key => {
      if (attendanceView === 'month') {
        const [y, m, d] = key.split('-');
        const dateObj = new Date(y, m - 1, d);
        return {
          name: dateObj.toLocaleDateString('default', { month: 'short', day: 'numeric' }),
          classes: rawCounts[key]
        };
      } else {
        const [y, m] = key.split('-');
        const dateObj = new Date(y, m - 1);
        return {
          name: dateObj.toLocaleString('default', { month: 'short' }) + ' ' + y.substring(2),
          classes: rawCounts[key]
        };
      }
    });
  }, [member, attendanceView]);

                  className="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg p-2.5 outline-none"
                  value={newRankForm.color}
                  onChange={e => setNewRankForm({...newRankForm, color: e.target.value})}
                >
                  {beltColors.map(bc => <option key={bc.value} value={bc.value}>{bc.label}</option>)}
                </select>
              </div>
              <div className="flex gap-3 pt-2">
                <Button type="button" variant="outline" className="flex-1" onClick={() => setShowEditRankModal(false)}>Cancel</Button>
                <Button type="submit" className="flex-1">Save Changes</Button>
              </div>
            </form>
          </div>
        </div>
      )}

      {showUploadDocModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm animate-in fade-in duration-200">
          <div className="bg-white border border-slate-200 p-6 rounded-2xl max-w-md w-full mx-4 shadow-2xl">
            <h3 className="text-xl font-bold text-slate-900 mb-2">Upload Document Template</h3>
            <form onSubmit={handleUploadDocSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Document Name</label>
                <Input required placeholder="e.g. Adult Risk Waiver 2026" value={newDocForm.name} onChange={e => setNewDocForm({...newDocForm, name: e.target.value})} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Document Type</label>
                <select 
                  className="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg p-2.5 outline-none"
                  value={newDocForm.type}
                  onChange={e => setNewDocForm({...newDocForm, type: e.target.value})}
                >
                  <option value="Waiver">Liability Waiver</option>
                  <option value="Incident Report">Incident Report Form</option>
                  <option value="Agreement">Membership Agreement</option>
                  <option value="Medical">Medical Release Form</option>
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">File Upload</label>
                <div className="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer">
                  <Upload className="w-8 h-8 text-slate-400 mx-auto mb-2" />
                  <p className="text-xs font-medium text-slate-700">Click to upload or drag & drop</p>
                  <p className="text-[10px] text-slate-400 mt-1">PDF, DOCX up to 10MB</p>
                </div>
              </div>
              <div className="flex gap-3 pt-2">
                <Button type="button" variant="outline" className="flex-1" onClick={() => setShowUploadDocModal(false)}>Cancel</Button>
                <Button type="submit" className="flex-1">Upload</Button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

const KioskView = ({ onExit, members, setMembers, classes, staffList }) => {
  const [emailInput, setEmailInput] = useState('');
  const [step, setStep] = useState('identify'); // identify, select-class, success
  const [foundMember, setFoundMember] = useState(null);
  const [selectedClassId, setSelectedClassId] = useState('');
  
  const [showExitModal, setShowExitModal] = useState(false);
  const [exitPin, setExitPin] = useState('');
  const [exitError, setExitError] = useState('');

  const todayStr = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  const todayClasses = classes.filter(c => c.day === todayStr);

  const handleIdentify = (e) => {
    e.preventDefault();
    const m = members.find(mbr => mbr.email.toLowerCase() === emailInput.toLowerCase());
    if (m) {
      setFoundMember(m);
      setStep('select-class');
    } else {
      alert("Member not found. Please see front desk.");
    }
  };

  const handleCheckIn = (e) => {
    e.preventDefault();
    const cls = classes.find(c => c.id === selectedClassId);
    if (!cls || !foundMember) return;

    const dateStr = new Date().toISOString().split('T')[0];
    const newHistory = { id: `kiosk-${Date.now()}`, date: dateStr, className: cls.title };

    const updated = members.map(m => {
      if (m.id === foundMember.id) {
        return {
          ...m,
          rank: { ...m.rank, classesSincePromotion: m.rank.classesSincePromotion + 1 },
          attendance: {
            ...m.attendance,
            total: m.attendance.total + 1,
            thisMonth: m.attendance.thisMonth + 1,
            lastAttended: dateStr,
            history: [newHistory, ...(m.attendance.history || [])]
          }
        };
      }
      return m;
    });
    
    setMembers(updated);
    setStep('success');
    
    setTimeout(() => {
      setStep('identify');
      setEmailInput('');
      setFoundMember(null);
      setSelectedClassId('');
    }, 4000);
  };

  const handleExitAttempt = (e) => {
    e.preventDefault();
    const staff = staffList.find(s => s.pin === exitPin);
    if (staff) {
      onExit();
    } else {
      setExitError("Invalid Staff PIN.");
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center font-sans">
       <button onClick={() => setShowExitModal(true)} className="absolute top-6 right-6 text-slate-500 hover:text-slate-300 flex items-center gap-2 text-sm font-medium">
         <Lock className="w-4 h-4" /> Staff Exit
       </button>

       <div className="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-500">
         <div className="p-10 text-center bg-blue-600 text-white">
            <h1 className="text-3xl font-bold mb-2">Self Check-in</h1>
            <p className="text-blue-100 font-medium">Welcome! Please sign in for your class.</p>
         </div>

         <div className="p-10">
            {step === 'identify' && (
              <form onSubmit={handleIdentify} className="space-y-6">
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-2">Enter your Email Address</label>
                  <input 
                    required autoFocus type="email" placeholder="student@example.com"
                    className="w-full text-lg p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all"
                    value={emailInput} onChange={e => setEmailInput(e.target.value)}
                  />
                </div>
                <Button type="submit" className="w-full py-4 text-lg" size="lg">Continue</Button>
              </form>
            )}

            {step === 'select-class' && (
              <form onSubmit={handleCheckIn} className="space-y-6">
                <div className="text-center mb-6">
                  <h3 className="text-xl font-bold text-slate-900">Hello, {foundMember.name.split(' ')[0]}!</h3>
                  <p className="text-slate-500 mt-1">Select the class you are attending today.</p>
                </div>
                
                <div className="space-y-3">
                  {todayClasses.map(cls => (
                    <label key={cls.id} className={`flex items-center justify-between p-4 border rounded-xl cursor-pointer transition-colors ${selectedClassId === cls.id ? 'border-blue-600 bg-blue-50' : 'border-slate-200 hover:bg-slate-50'}`}>
                      <div>
                        <div className="font-bold text-slate-900">{cls.title}</div>
                        <div className="text-sm text-slate-500">{cls.startTime}</div>
                      </div>
                      <input 
                        type="radio" name="classSelect" value={cls.id}
                        className="w-5 h-5 text-blue-600"
                        checked={selectedClassId === cls.id} onChange={(e) => setSelectedClassId(e.target.value)}
                      />
                    </label>
                  ))}
                  {todayClasses.length === 0 && <div className="text-center text-slate-500 py-4">No classes scheduled for today.</div>}
                </div>

                <div className="flex gap-4">
                  <Button type="button" variant="outline" className="flex-1 py-4 text-lg" size="lg" onClick={() => setStep('identify')}>Cancel</Button>
                  <Button type="submit" disabled={!selectedClassId} className="flex-1 py-4 text-lg" size="lg">Check-in</Button>
                </div>
              </form>
            )}

            {step === 'success' && (
              <div className="text-center py-8 animate-in fade-in zoom-in duration-300">
                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                  <CheckCircle className="w-10 h-10" />
                </div>
                <h3 className="text-2xl font-bold text-slate-900 mb-2">You're checked in!</h3>
                <p className="text-slate-600 mb-4">Have a great class.</p>
                <div className="text-sm text-slate-500 bg-slate-50 p-3 rounded-lg inline-block">
                  <strong className="text-indigo-600">{foundMember.rank.requiredClasses - (foundMember.rank.classesSincePromotion + 1)} classes</strong> left until your next rank evaluation!
                </div>
              </div>
            )}
         </div>
       </div>

       {showExitModal && (
         <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm animate-in fade-in duration-200">
          <div className="bg-white border border-slate-200 p-8 rounded-2xl max-w-sm w-full mx-4 shadow-2xl text-center">
            <h3 className="text-xl font-bold text-slate-900 mb-2">Secure Staff Exit</h3>
            <p className="text-sm text-slate-600 mb-6">Enter PIN to close kiosk mode.</p>
            {exitError && <p className="text-rose-600 text-sm font-semibold mb-4">{exitError}</p>}
            <form onSubmit={handleExitAttempt}>
               <input 
                 autoFocus type="password" 
                 className="w-full bg-slate-50 border border-slate-300 text-slate-900 text-center text-3xl tracking-[0.5em] font-mono rounded-xl py-3 outline-none focus:border-blue-500 mb-6"
                 value={exitPin} onChange={e => setExitPin(e.target.value)} placeholder="••••"
               />
               <div className="flex gap-3">
                 <Button type="button" variant="outline" className="flex-1" onClick={() => {setShowExitModal(false); setExitPin(''); setExitError('');}}>Cancel</Button>
                 <Button type="submit" className="flex-1 bg-slate-900 text-white hover:bg-slate-800">Exit Kiosk</Button>
               </div>
            </form>
          </div>
         </div>
       )}
    </div>
  );
};
